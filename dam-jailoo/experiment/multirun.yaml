# @package _global_
    
core:
  url_data: ''
  hardware:
    gpu_info: true
    visible_gpus:
    - 1

hydra:
  run:
    dir: output/${now:%Y-%m-%d}/example
  sweep:
    dir: multirun/${now:%Y-%m-%d}
    subdir: ${hydra.job.num}
  # launcher:
  #   n_jobs: 1

defaults:
- /user/conf/processes@processes.clim_chelsa_trace21k: clim_chelsa_trace21k
- /user/conf/processes@processes.smb_enhanced_accpdd: smb_enhanced_accpdd
# - /user/conf/processes@processes.heatmaps: heatmaps
- /user/conf/outputs@outputs.write_ts_henz: write_ts_henz

- override /inputs:
  - load_ncdf
- override /processes:
  - clim_chelsa_trace21k
  - smb_enhanced_accpdd
  - iceflow
  - time
  - thk
  - avalanche
  # - heatmaps
- override /outputs:
  - write_ncdf
  - write_ts_henz

inputs:
  load_ncdf:
    input_file: input.nc
    crop: true
    xmin: 283999
    xmax: 298195
    ymin: 4387818
    ymax: 4409423
    icemask_include: true
    icemask_shapefile: ../../../data/icemask.shp

processes:
  clim_chelsa_trace21k:
    air_temp_offset: -1.0
  smb_enhanced_accpdd:
    precip_offset: 1.0
    type_of_aspect_correction: "temperature"
    aspect_scaling_factor: 1.1
  iceflow:
    method: unified
    numerics:
      basis_vertical: Lagrange
    unified:
      bcs: [no_inflow]
  time:
    start: -15000
    end: 0.0
    save: 10
  avalanche:
    angleOfRepose: 60.0
  # heatmaps:
  #   time_start_icemargin: -14000.0

outputs:
  write_ncdf:
    vars_to_save:
    - topg
    - usurf
    - thk
    - smb
    - velsurf_mag
    - velbase_mag