update_freq:
  Type: float
  Units: y
  Description: "Update the mass balance each X years"
refreeze_factor:
  Type: float
  Units: dimless
  Description: "Refreezing factor"
thr_temp_snow:
  Type: float
  Units: ^{\circ}C
  Description: "Threshold temperature for solid precipitation"
thr_temp_rain:
  Type: float
  Units: ^{\circ}C
  Description: "Threshold temperature for liquid precipitation"
melt_factor_snow:
  Type: float
  Units: m yr^{-1} K^{-1}
  Description: "Degree-day factor for snow (ice eq.)"
melt_factor_ice:
  Type: float
  Units: m yr^{-1} K^{-1}
  Description: "Degree-day factor for ice (ice eq.)"
shift_hydro_year:
  Type: float
  Units: dimless
  Description: "This serves to start Oct 1. the acc/melt computation"
ice_density:
  Type: float
  Units: kg m^{-3}
  Description: "Density of ice for conversion of SMB into ice equivalent"
wat_density:
  Type: float
  Units: kg m^{-3}
  Description: "Density of water"
smb_maximum_accumulation:
  Type: float
  Units: m yr^{-1}
  Description: "Maximum accumulation rate (m yr^{-1})"
precip_offset:
  Type: float
  Units: dimless
  Description: "Offset for precipitation (0.5 means 50% of the precipitation than in the climate file)"
solar_elevation:
  Type: float
  Units: degrees
  Description: "Solar elevation angle above the horizon, for a latitude of 40° North, the solar elevation is 73.0 degrees at noon on the summer solstice"
solar_azimuth:
  Type: float
  Units: degrees
  Description: "Solar azimuth angle, degrees from north, clockwise, if on Northern hemisphere, otherwise 0.0 for Southern hemisphere"
type_of_aspect_correction:
  Type: str
  Units: -
  Description: "Type of aspect correction, either 'smb' or 'temperature'"
aspect_scaling_factor:
  Type: float
  Units: dimless
  Description: "Scaling factor for the aspect correction, if zero, no aspect correction is applied, it can be either m for smb or K for temperature, expected values for the Alps are 0.7-1.35 m for smb and 0.5-1.0 K for temperature"